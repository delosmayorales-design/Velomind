<script>
const API_BASE = window.API_URL ||
  (location.hostname==='localhost'||location.hostname==='127.0.0.1'
    ? 'http://localhost:3000/api'
    : 'https://velomind-backend.onrender.com/api');

// ── Estado ──────────────────────────────────────────────────────
let map, elevationChart;
let waypoints    = [];   // [{lat,lng}] puntos del usuario
let routeLayer   = null; // polyline activa en mapa
let routeGeoJSON = null; // GeoJSON de la ruta calculada
let allRoutes    = [];
let activeFilter = 'all';
let currentMode  = 'draw';
let drawingMode  = false;
let loadedRouteId = null;

// Marcadores temporales
const waypointMarkers = [];

// ── Inicializar mapa ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  loadRoutes();
});

function initMap() {
  // Intentar centrar en posición del usuario
  map = L.map('map', { zoomControl: true }).setView([40.4168, -3.7038], 12);

  // Tiles OSM estándar
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // Overlay CyclOSM (carril bici y rutas ciclistas)
  const cyclOSM = L.tileLayer('https://tile.waymarkedtrails.org/cycling/{z}/{x}/{y}.png', {
    maxZoom: 19, opacity: 0.5,
    attribution: '© <a href="https://cycling.waymarkedtrails.org">Waymarked Trails</a>'
  });

  // Control de capas
  L.control.layers(
    { 'Mapa estándar': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }) },
    { 'Rutas ciclistas': cyclOSM }
  ).addTo(map);

  // Click para añadir waypoints en modo dibujo
  map.on('click', onMapClick);

  // Geolocalización
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 13);
    }, () => {});
  }
}

// ── Modo dibujo ──────────────────────────────────────────────────
function startDrawing() {
  drawingMode = true;
  loadedRouteId = null;
  clearRoute();
  document.getElementById('map-toolbar').style.display = 'flex';
  document.getElementById('map-stats').style.display = 'flex';
  map.getContainer().style.cursor = 'crosshair';
  setMode('draw');
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.map-tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + mode);
  if (btn) btn.classList.add('active');
}

async function onMapClick(e) {
  if (!drawingMode || currentMode !== 'draw') return;
  const { lat, lng } = e.latlng;
  waypoints.push({ lat, lng });

  // Marcador pequeño
  const marker = L.circleMarker([lat, lng], {
    radius: 5, fillColor: '#FF6B35', color: '#fff',
    weight: 2, opacity: 1, fillOpacity: 1
  }).addTo(map);
  waypointMarkers.push(marker);

  if (waypoints.length >= 2) {
    await recalcRoute();
  }
}

async function recalcRoute() {
  if (waypoints.length < 2) return;

  // Llamar a OSRM (cycling profile, servidor público)
  const coords = waypoints.map(w => `${w.lng},${w.lat}`).join(';');
  try {
    const url = `https://router.project-osrm.org/route/v1/cycling/${coords}?overview=full&geometries=geojson`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.code !== 'Ok' || !data.routes[0]) return;

    const route = data.routes[0];
    routeGeoJSON = route.geometry;

    if (routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.geoJSON(routeGeoJSON, {
      style: { color: '#FF6B35', weight: 4, opacity: 0.9 }
    }).addTo(map);

    const distKm  = route.distance / 1000;
    const minutes = Math.round(route.duration / 60);

    document.getElementById('stat-dist').textContent = distKm.toFixed(1);
    document.getElementById('stat-time').textContent = formatTime(minutes);

    // Pedir elevación
    fetchElevation(routeGeoJSON.coordinates);

  } catch (e) {
    console.warn('[Rutas] OSRM error:', e.message);
  }
}

async function fetchElevation(coords) {
  // Muestrear cada N puntos para no superar el límite de la API
  const step    = Math.max(1, Math.floor(coords.length / 100));
  const sampled = coords.filter((_, i) => i % step === 0);
  const locations = sampled.map(c => `${c[1]},${c[0]}`).join('|');

  try {
    const res  = await fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${locations}`);
    const data = await res.json();
    if (data.status !== 'OK') return;

    const elevs = data.results.map(r => r.elevation || 0);
    let gain = 0;
    for (let i = 1; i < elevs.length; i++) {
      const diff = elevs[i] - elevs[i-1];
      if (diff > 0) gain += diff;
    }
    document.getElementById('stat-elev').textContent = Math.round(gain);
    renderElevationChart(elevs);
  } catch (e) {
    console.warn('[Rutas] Elevación no disponible');
  }
}

function renderElevationChart(elevs) {
  const panel = document.getElementById('elevation-panel');
  panel.classList.add('visible');
  const ctx = document.getElementById('elevation-chart').getContext('2d');
  if (elevationChart) elevationChart.destroy();
  elevationChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: elevs.map((_, i) => i),
      datasets: [{
        data: elevs,
        borderColor: '#FF6B35',
        backgroundColor: 'rgba(255,107,53,0.15)',
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => `${Math.round(ctx.parsed.y)} m` }
      }},
      scales: {
        x: { display: false },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font:{size:10} } }
      }
    }
  });
}

function undoWaypoint() {
  if (!waypoints.length) return;
  waypoints.pop();
  const m = waypointMarkers.pop();
  if (m) map.removeLayer(m);
  if (waypoints.length >= 2) recalcRoute();
  else if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
}

function clearRoute() {
  waypoints = [];
  waypointMarkers.forEach(m => map.removeLayer(m));
  waypointMarkers.length = 0;
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  routeGeoJSON = null;
  document.getElementById('stat-dist').textContent = '0.0';
  document.getElementById('stat-elev').textContent = '—';
  document.getElementById('stat-time').textContent = '—';
  document.getElementById('elevation-panel').classList.remove('visible');
}

// ── Importar GPX ─────────────────────────────────────────────────
function importGPX(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const xml = new DOMParser().parseFromString(e.target.result, 'text/xml');
      const trkpts = xml.querySelectorAll('trkpt,rtept,wpt');
      if (!trkpts.length) { alert('No se encontraron puntos en el archivo GPX'); return; }

      const coords = Array.from(trkpts).map(pt => [
        parseFloat(pt.getAttribute('lon')),
        parseFloat(pt.getAttribute('lat'))
      ]);
      const elevNodes = Array.from(trkpts).map(pt => {
        const el = pt.querySelector('ele');
        return el ? parseFloat(el.textContent) : null;
      });

      clearRoute();
      drawingMode = false;
      routeGeoJSON = { type: 'LineString', coordinates: coords };
      loadedRouteId = null;

      if (routeLayer) map.removeLayer(routeLayer);
      routeLayer = L.geoJSON(routeGeoJSON, {
        style: { color: '#10B981', weight: 4, opacity: 0.9 }
      }).addTo(map);
      map.fitBounds(routeLayer.getBounds(), { padding: [30,30] });

      // Stats
      const distKm = calcDistance(coords);
      document.getElementById('stat-dist').textContent = distKm.toFixed(1);
      const elevs = elevNodes.filter(e => e !== null);
      if (elevs.length) {
        let gain = 0;
        for (let i=1;i<elevs.length;i++) { const d=elevs[i]-elevs[i-1]; if(d>0) gain+=d; }
        document.getElementById('stat-elev').textContent = Math.round(gain);
        renderElevationChart(elevs);
      }
      document.getElementById('stat-time').textContent = formatTime(Math.round(distKm / 0.25));
      document.getElementById('map-toolbar').style.display = 'flex';
      document.getElementById('map-stats').style.display = 'flex';

      // Pre-rellenar nombre con el del archivo
      const routeName = file.name.replace(/\.(gpx|tcx)$/i,'').replace(/_/g,' ');
      document.getElementById('route-name-input').value = routeName;

    } catch(err) {
      alert('Error al leer el archivo: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function calcDistance(coords) {
  let d = 0;
  for (let i=1;i<coords.length;i++) {
    const [lon1,lat1] = coords[i-1];
    const [lon2,lat2] = coords[i];
    const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    d += R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }
  return d;
}

// ── Guardar ruta ─────────────────────────────────────────────────
function openSaveModal() {
  if (!routeGeoJSON) { alert('Traza al menos 2 puntos antes de guardar'); return; }
  document.getElementById('save-modal').style.display = 'block';
}
function closeSaveModal() {
  document.getElementById('save-modal').style.display = 'none';
}

async function saveCurrentRoute() {
  const name = document.getElementById('route-name-input').value.trim() || 'Mi Ruta';
  const type = document.getElementById('route-type-select').value;
  const distKm  = parseFloat(document.getElementById('stat-dist').textContent) || null;
  const elevGain = parseInt(document.getElementById('stat-elev').textContent) || null;
  const timeMin  = parseTimeMinutes(document.getElementById('stat-time').textContent);

  const btn = document.querySelector('.modal-btn-save');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try {
    const res = await Auth.apiFetch(`${API_BASE}/routes`, {
      method: 'POST',
      body: JSON.stringify({ name, type, geojson: routeGeoJSON, distance_km: distKm, elevation_gain_m: elevGain, estimated_minutes: timeMin }),
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Error');
    closeSaveModal();
    clearRoute();
    drawingMode = false;
    document.getElementById('map-toolbar').style.display = 'none';
    document.getElementById('map-stats').style.display = 'none';
    map.getContainer().style.cursor = '';
    await loadRoutes();
  } catch(e) {
    alert('Error al guardar: ' + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Guardar';
  }
}

// ── Cargar y mostrar rutas ────────────────────────────────────────
async function loadRoutes() {
  try {
    const res = await Auth.apiFetch(`${API_BASE}/routes`);
    if (!res.ok) throw new Error();
    allRoutes = await res.json();
    renderRouteList();
  } catch(e) {
    document.getElementById('routes-list').innerHTML =
      '<div class="empty-routes"><i class="fas fa-exclamation-circle"></i><br>No se pudieron cargar las rutas</div>';
  }
}

function filterRoutes(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderRouteList();
}

function renderRouteList() {
  const list = document.getElementById('routes-list');
  const filtered = activeFilter === 'all' ? allRoutes : allRoutes.filter(r => r.type === activeFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-routes">
      <i class="fas fa-route" style="font-size:32px;opacity:0.3;display:block;margin-bottom:12px"></i>
      ${activeFilter==='all'?'Aún no tienes rutas guardadas.<br>Crea una nueva o importa un GPX.':'No hay rutas de tipo '+activeFilter}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(r => `
    <div class="route-item" data-id="${r.id}" onclick="loadRouteOnMap('${r.id}')">
      <div class="route-item-name">
        <span>${r.name}</span>
        <span class="route-type-badge badge-${r.type}">${r.type.toUpperCase()}</span>
        ${r.is_favorite ? '<i class="fas fa-star" style="color:#F59E0B;font-size:10px"></i>' : ''}
      </div>
      <div class="route-item-meta">
        ${r.distance_km ? r.distance_km+' km' : ''}
        ${r.elevation_gain_m ? ' · '+r.elevation_gain_m+' m D+' : ''}
        ${r.estimated_minutes ? ' · ~'+formatTime(r.estimated_minutes) : ''}
      </div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button onclick="event.stopPropagation();toggleFav('${r.id}',${!r.is_favorite})"
          style="background:none;border:none;color:${r.is_favorite?'#F59E0B':'#6b7280'};cursor:pointer;font-size:12px;padding:0">
          <i class="fas fa-star"></i>
        </button>
        <button onclick="event.stopPropagation();exportRouteGPX('${r.id}')"
          style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:12px;padding:0" title="Exportar GPX">
          <i class="fas fa-file-export"></i>
        </button>
        <button onclick="event.stopPropagation();deleteRoute('${r.id}')"
          style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:12px;padding:0" title="Eliminar">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
  `).join('');
}

function loadRouteOnMap(id) {
  const route = allRoutes.find(r => r.id === id);
  if (!route || !route.geojson) return;

  // Desactivar modo dibujo
  drawingMode = false;
  clearRoute();
  map.getContainer().style.cursor = '';
  document.getElementById('map-toolbar').style.display = 'flex';
  document.getElementById('map-stats').style.display = 'flex';

  loadedRouteId = id;
  routeGeoJSON  = route.geojson;

  if (routeLayer) map.removeLayer(routeLayer);
  routeLayer = L.geoJSON(routeGeoJSON, {
    style: { color: '#FF6B35', weight: 4, opacity: 0.9 }
  }).addTo(map);
  map.fitBounds(routeLayer.getBounds(), { padding: [40,40] });

  document.getElementById('stat-dist').textContent = route.distance_km?.toFixed(1) ?? '—';
  document.getElementById('stat-elev').textContent = route.elevation_gain_m ? Math.round(route.elevation_gain_m) : '—';
  document.getElementById('stat-time').textContent = route.estimated_minutes ? formatTime(route.estimated_minutes) : '—';

  // Marcar activo en lista
  document.querySelectorAll('.route-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  // Pedir elevación si no hay
  if (route.geojson.coordinates) fetchElevation(route.geojson.coordinates);
}

async function toggleFav(id, fav) {
  await Auth.apiFetch(`${API_BASE}/routes/${id}`, {
    method: 'PATCH',
    body: JSON.stringify({ is_favorite: fav }),
  });
  await loadRoutes();
}

async function deleteRoute(id) {
  if (!confirm('¿Eliminar esta ruta?')) return;
  await Auth.apiFetch(`${API_BASE}/routes/${id}`, { method: 'DELETE' });
  if (loadedRouteId === id) { clearRoute(); loadedRouteId = null; }
  await loadRoutes();
}

function exportRouteGPX(id) {
  const route = allRoutes.find(r => r.id === id);
  if (!route?.geojson?.coordinates) return;
  const coords = route.geojson.coordinates;
  const trkpts = coords.map(c => `    <trkpt lat="${c[1]}" lon="${c[0]}"></trkpt>`).join('\n');
  const gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="VeloMind">
  <trk>
    <name>${route.name}</name>
    <trkseg>
${trkpts}
    </trkseg>
  </trk>
</gpx>`;
  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = route.name.replace(/\s+/g,'_') + '.gpx';
  a.click();
}

// ── Sugerencia del viento ─────────────────────────────────────────
async function toggleWindSuggestion() {
  const card = document.getElementById('wind-card');
  if (card.classList.contains('visible')) { card.classList.remove('visible'); return; }
  card.classList.add('visible');
  document.getElementById('wind-advice').textContent = 'Obteniendo datos meteorológicos...';

  if (!navigator.geolocation) {
    document.getElementById('wind-advice').textContent = 'Geolocalización no disponible.';
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const { latitude: lat, longitude: lon } = pos.coords;
      // Open-Meteo: gratis, sin API key, datos de viento
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m,wind_direction_10m,weathercode&wind_speed_unit=kmh`;
      const res  = await fetch(url);
      const data = await res.json();
      const cur  = data.current;
      const speed = Math.round(cur.wind_speed_10m);
      const deg   = cur.wind_direction_10m;

      // Dirección del viento: el viento VIENE DE esta dirección
      const dirs = ['N','NE','E','SE','S','SO','O','NO','N'];
      const dir  = dirs[Math.round(deg/45)];

      // Flecha apuntando a donde sopla el viento (origen + 180°)
      const arrDeg = (deg + 180) % 360;
      document.getElementById('wind-arrow').style.transform = `rotate(${arrDeg}deg)`;
      document.getElementById('wind-arrow').textContent = '↑';

      // Consejo: salir en contra del viento (de donde viene), volver con él
      const oppDir = dirs[Math.round(((deg+180)%360)/45)];
      document.getElementById('wind-advice').innerHTML =
        `<strong>${speed} km/h</strong> desde el <strong>${dir}</strong>.<br>
         Sal hacia el <strong>${dir}</strong> (contra el viento) y vuelve con él.`;
      document.getElementById('wind-sub').textContent =
        speed < 15 ? 'Viento suave — cualquier ruta es buena.'
        : speed < 30 ? 'Viento moderado — planifica bien el regreso.'
        : '⚠️ Viento fuerte — ruta circular corta recomendada.';

    } catch(e) {
      document.getElementById('wind-advice').textContent = 'No se pudieron obtener los datos del viento.';
    }
  }, () => {
    document.getElementById('wind-advice').textContent = 'Activa la ubicación para ver el viento local.';
  });
}

// ── Utilidades ───────────────────────────────────────────────────
function formatTime(minutes) {
  if (!minutes || isNaN(minutes)) return '—';
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return h ? `${h}h ${m>0?m+'min':''}` : `${m}min`;
}

function parseTimeMinutes(str) {
  if (!str || str === '—') return null;
  const hMatch = str.match(/(\d+)h/);
  const mMatch = str.match(/(\d+)min/);
  return (hMatch ? parseInt(hMatch[1])*60 : 0) + (mMatch ? parseInt(mMatch[1]) : 0) || null;
}
