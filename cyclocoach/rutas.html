<script>
const API_BASE = window.API_URL;

// ── Estado ───────────────────────────────────────────────────────
let map, elevChart;
let waypoints        = [];
let waypointMarkers  = [];
let routeLayer       = null;
let routeGeoJSON     = null;
let allRoutes        = [];
let activeFilter     = 'all';
let drawingActive    = false;
let currentRouteType = 'road';

// ── Mapa ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  map = L.map('map', { zoomControl: true }).setView([40.4168, -3.7038], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // Overlay rutas ciclistas (opcional)
  const cycleOverlay = L.tileLayer('https://tile.waymarkedtrails.org/cycling/{z}/{x}/{y}.png', {
    opacity: 0.45, maxZoom: 19,
    attribution: '© Waymarked Trails'
  });

  L.control.layers({}, { 'Rutas ciclistas (overlay)': cycleOverlay }).addTo(map);

  map.on('click', onMapClick);

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
      map.setView([p.coords.latitude, p.coords.longitude], 13);
    }, () => {});
  }

  loadRoutes();
});

// ── Decode Valhalla/Google polyline (precision 6) ─────────────────
function decodePolyline6(encoded) {
  const coords = [];
  let idx = 0, lat = 0, lng = 0;
  while (idx < encoded.length) {
    let b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    coords.push([lat / 1e6, lng / 1e6]);
  }
  return coords; // [[lat,lng],...]
}

// ── Calcular ruta con Valhalla OSM (gratis, sin API key) ──────────
// Perfiles: bicycle (road/gravel), mountain_bike (MTB)
async function calcRoute(type) {
  if (waypoints.length < 2) return;
  document.getElementById('route-loading').classList.add('visible');
  try {
    const costing = type === 'mtb' ? 'mountain_bike'
                  : type === 'gravel' ? 'bicycle' : 'bicycle';

    const costingOpts = type === 'road'
      ? { bicycle: { use_roads: 0.9, use_hills: 0.5 } }
      : type === 'gravel'
        ? { bicycle: { use_roads: 0.2, use_hills: 0.5, avoid_bad_surfaces: 0.1 } }
        : {};

    const body = {
      locations: waypoints.map(w => ({ lat: w.lat, lon: w.lng, type: 'break' })),
      costing,
      costing_options: costingOpts,
      directions_options: { units: 'km' },
    };

    const res  = await fetch('https://valhalla1.openstreetmap.de/route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('Valhalla ' + res.status);
    const data = await res.json();

    const leg      = data.trip.legs[0];
    const latLngs  = decodePolyline6(leg.shape);
    const distKm   = data.trip.summary.length;          // km
    const durMin   = Math.round(data.trip.summary.time / 60);

    routeGeoJSON = {
      type: 'LineString',
      coordinates: latLngs.map(([la, ln]) => [ln, la]),
    };

    const color = type === 'road' ? '#FF6B35' : type === 'gravel' ? '#F59E0B' : '#10B981';
    if (routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline(latLngs, { color, weight: 4, opacity: 0.9 }).addTo(map);

    document.getElementById('stat-dist').textContent = distKm.toFixed(1);
    document.getElementById('stat-time').textContent = formatTime(durMin);

    // Elevación
    fetchElevation(latLngs);
  } catch (e) {
    console.warn('[Rutas] Error calculando ruta:', e.message);
  } finally {
    document.getElementById('route-loading').classList.remove('visible');
  }
}

// ── Elevación (opentopodata, sin API key) ─────────────────────────
async function fetchElevation(latLngs) {
  const step    = Math.max(1, Math.floor(latLngs.length / 80));
  const sampled = latLngs.filter((_, i) => i % step === 0);
  const locs    = sampled.map(([la, ln]) => `${la},${ln}`).join('|');
  try {
    const res  = await fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${locs}`);
    const data = await res.json();
    if (data.status !== 'OK') return;
    const elevs = data.results.map(r => r.elevation ?? 0);
    let gain = 0;
    for (let i = 1; i < elevs.length; i++) { const d = elevs[i]-elevs[i-1]; if (d>0) gain+=d; }
    document.getElementById('stat-elev').textContent = Math.round(gain);
    renderElevChart(elevs);
  } catch { /* silencioso */ }
}

function renderElevChart(elevs) {
  const panel = document.getElementById('elev-panel');
  panel.classList.add('visible');
  const ctx = document.getElementById('elev-chart').getContext('2d');
  if (elevChart) elevChart.destroy();
  elevChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: elevs.map((_, i) => i),
      datasets: [{
        data: elevs,
        borderColor: '#FF6B35',
        backgroundColor: 'rgba(255,107,53,0.12)',
        borderWidth: 2, fill: true, tension: 0.3, pointRadius: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: c => Math.round(c.parsed.y) + ' m' }
      }},
      scales: {
        x: { display: false },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font:{size:10} } }
      }
    }
  });
}

// ── Dibujo ───────────────────────────────────────────────────────
function startDrawing() {
  clearRoute();
  drawingActive = true;
  document.getElementById('map').classList.add('drawing');
  document.getElementById('map-toolbar').classList.add('visible');
  document.getElementById('map-stats').classList.add('visible');

  // Leer tipo del filtro activo o road por defecto
  const activeTab = document.querySelector('.filter-tab.active');
  const tabType   = activeTab?.textContent.trim().toLowerCase();
  currentRouteType = ['road','gravel','mtb'].includes(tabType) ? tabType : 'road';
}

async function onMapClick(e) {
  if (!drawingActive) return;
  const { lat, lng } = e.latlng;
  waypoints.push({ lat, lng });

  const marker = L.circleMarker([lat, lng], {
    radius: 5, fillColor: '#FF6B35', color: '#fff', weight: 2, fillOpacity: 1
  }).addTo(map);
  waypointMarkers.push(marker);

  if (waypoints.length >= 2) {
    await calcRoute(currentRouteType);
  }
}

function undoWaypoint() {
  if (!waypoints.length) return;
  waypoints.pop();
  const m = waypointMarkers.pop();
  if (m) map.removeLayer(m);
  if (waypoints.length >= 2) calcRoute(currentRouteType);
  else if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
}

function clearRoute() {
  waypoints = [];
  waypointMarkers.forEach(m => map.removeLayer(m));
  waypointMarkers.length = 0;
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  routeGeoJSON = null;
  document.getElementById('stat-dist').textContent = '0.0';
  document.getElementById('stat-elev').textContent = '—';
  document.getElementById('stat-time').textContent = '—';
  document.getElementById('elev-panel').classList.remove('visible');
}

// ── Importar GPX/TCX ─────────────────────────────────────────────
function importGPX(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const xml    = new DOMParser().parseFromString(e.target.result, 'text/xml');
      const trkpts = Array.from(xml.querySelectorAll('trkpt,rtept,wpt'));
      if (!trkpts.length) { alert('No se encontraron puntos en el archivo'); return; }

      const latLngs = trkpts.map(pt => [
        parseFloat(pt.getAttribute('lat')),
        parseFloat(pt.getAttribute('lon')),
      ]);
      const elevs = trkpts.map(pt => {
        const el = pt.querySelector('ele');
        return el ? parseFloat(el.textContent) : null;
      }).filter(v => v !== null);

      drawingActive = false;
      clearRoute();
      document.getElementById('map').classList.remove('drawing');

      routeGeoJSON = {
        type: 'LineString',
        coordinates: latLngs.map(([la, ln]) => [ln, la]),
      };

      if (routeLayer) map.removeLayer(routeLayer);
      routeLayer = L.polyline(latLngs, { color: '#10B981', weight: 4, opacity: 0.9 }).addTo(map);
      map.fitBounds(routeLayer.getBounds(), { padding: [30,30] });

      const distKm = haversineTotal(latLngs);
      document.getElementById('stat-dist').textContent = distKm.toFixed(1);
      document.getElementById('stat-time').textContent = formatTime(Math.round(distKm / 0.28));

      if (elevs.length) {
        let gain = 0;
        for (let i=1;i<elevs.length;i++) { const d=elevs[i]-elevs[i-1]; if(d>0) gain+=d; }
        document.getElementById('stat-elev').textContent = Math.round(gain);
        renderElevChart(elevs);
      }

      document.getElementById('map-toolbar').classList.add('visible');
      document.getElementById('map-stats').classList.add('visible');
      document.getElementById('modal-name').value =
        file.name.replace(/\.(gpx|tcx)$/i,'').replace(/[_-]/g,' ');
    } catch(err) {
      alert('Error al leer el archivo: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ── Guardar ruta ─────────────────────────────────────────────────
function openSaveModal() {
  if (!routeGeoJSON) { alert('Traza al menos 2 puntos antes de guardar'); return; }
  document.getElementById('save-modal').style.display = 'block';
}
function closeSaveModal() {
  document.getElementById('save-modal').style.display = 'none';
}

async function saveCurrentRoute() {
  const name    = document.getElementById('modal-name').value.trim() || 'Mi Ruta';
  const type    = document.getElementById('modal-type').value;
  const distKm  = parseFloat(document.getElementById('stat-dist').textContent) || null;
  const elevGain= parseInt(document.getElementById('stat-elev').textContent) || null;
  const timeMin = parseTimeMin(document.getElementById('stat-time').textContent);
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const res = await Auth.apiFetch(`${API_BASE}/routes`, {
      method: 'POST',
      body: JSON.stringify({ name, type, geojson: routeGeoJSON, distance_km: distKm, elevation_gain_m: elevGain, estimated_minutes: timeMin }),
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Error');
    closeSaveModal();
    clearRoute();
    drawingActive = false;
    document.getElementById('map').classList.remove('drawing');
    document.getElementById('map-toolbar').classList.remove('visible');
    document.getElementById('map-stats').classList.remove('visible');
    await loadRoutes();
  } catch(e) {
    alert('Error al guardar: ' + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Guardar';
  }
}

// ── Cargar rutas guardadas ────────────────────────────────────────
async function loadRoutes() {
  try {
    const res = await Auth.apiFetch(`${API_BASE}/routes`);
    if (!res.ok) throw new Error();
    allRoutes = await res.json();
    renderRouteList();
  } catch {
    document.getElementById('routes-list').innerHTML =
      '<div class="empty-routes"><i class="fas fa-exclamation-circle"></i><br>No se pudieron cargar las rutas</div>';
  }
}

function filterRoutes(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderRouteList();
}

function renderRouteList() {
  const list     = document.getElementById('routes-list');
  const filtered = activeFilter === 'all' ? allRoutes : allRoutes.filter(r => r.type === activeFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-routes">
      <i class="fas fa-route" style="font-size:30px;opacity:0.3;display:block;margin-bottom:10px"></i>
      ${activeFilter === 'all'
        ? 'Aún no tienes rutas.<br>Crea una nueva o importa un GPX.'
        : 'No hay rutas de tipo ' + activeFilter + '.'}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(r => `
    <div class="route-item" data-id="${r.id}" onclick="openRouteOnMap('${r.id}')">
      <div class="route-item-name">
        <span>${escHtml(r.name)}</span>
        <span class="badge-type badge-${r.type}">${r.type}</span>
        ${r.is_favorite ? '<i class="fas fa-star" style="color:#F59E0B;font-size:10px"></i>' : ''}
      </div>
      <div class="route-item-meta">
        ${r.distance_km ? r.distance_km + ' km' : ''}
        ${r.elevation_gain_m ? ' · ' + Math.round(r.elevation_gain_m) + ' m D+' : ''}
        ${r.estimated_minutes ? ' · ~' + formatTime(r.estimated_minutes) : ''}
      </div>
      <div class="route-item-actions">
        <button class="ri-action-btn ${r.is_favorite?'fav-active':''}" title="Favorito"
          onclick="event.stopPropagation();toggleFav('${r.id}',${!r.is_favorite})">
          <i class="fas fa-star"></i>
        </button>
        <button class="ri-action-btn" title="Exportar GPX"
          onclick="event.stopPropagation();exportGPX('${r.id}')">
          <i class="fas fa-file-export"></i> GPX
        </button>
        <button class="ri-action-btn" title="Eliminar"
          onclick="event.stopPropagation();deleteRoute('${r.id}')" style="color:#ff4757">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
  `).join('');
}

function openRouteOnMap(id) {
  const route = allRoutes.find(r => r.id === id);
  if (!route?.geojson) return;

  drawingActive = false;
  clearRoute();
  document.getElementById('map').classList.remove('drawing');

  routeGeoJSON = route.geojson;
  const color  = route.type === 'gravel' ? '#F59E0B' : route.type === 'mtb' ? '#10B981' : '#FF6B35';
  const latLngs = route.geojson.coordinates.map(([ln, la]) => [la, ln]);

  if (routeLayer) map.removeLayer(routeLayer);
  routeLayer = L.polyline(latLngs, { color, weight: 4, opacity: 0.9 }).addTo(map);
  map.fitBounds(routeLayer.getBounds(), { padding: [40,40] });

  document.getElementById('stat-dist').textContent = route.distance_km?.toFixed(1) ?? '—';
  document.getElementById('stat-elev').textContent = route.elevation_gain_m ? Math.round(route.elevation_gain_m) : '—';
  document.getElementById('stat-time').textContent = route.estimated_minutes ? formatTime(route.estimated_minutes) : '—';
  document.getElementById('map-toolbar').classList.add('visible');
  document.getElementById('map-stats').classList.add('visible');

  document.querySelectorAll('.route-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));

  fetchElevation(latLngs);
}

async function toggleFav(id, fav) {
  await Auth.apiFetch(`${API_BASE}/routes/${id}`, {
    method: 'PATCH', body: JSON.stringify({ is_favorite: fav }),
  });
  await loadRoutes();
}

async function deleteRoute(id) {
  if (!confirm('¿Eliminar esta ruta?')) return;
  await Auth.apiFetch(`${API_BASE}/routes/${id}`, { method: 'DELETE' });
  if (routeLayer && allRoutes.find(r => r.id === id)) {
    map.removeLayer(routeLayer); routeLayer = null;
  }
  await loadRoutes();
}

function exportGPX(id) {
  const route = allRoutes.find(r => r.id === id);
  if (!route?.geojson?.coordinates) return;
  const trkpts = route.geojson.coordinates
    .map(([ln, la]) => `    <trkpt lat="${la}" lon="${ln}"></trkpt>`).join('\n');
  const gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="VeloMind">
  <trk><name>${escHtml(route.name)}</name><trkseg>\n${trkpts}\n  </trkseg></trk>
</gpx>`;
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([gpx], { type:'application/gpx+xml' })),
    download: route.name.replace(/\s+/g,'_') + '.gpx',
  });
  a.click();
}

// ── Viento (Open-Meteo, sin API key) ─────────────────────────────
async function showWindSuggestion() {
  const card = document.getElementById('wind-card');
  if (card.classList.contains('visible')) { card.classList.remove('visible'); return; }
  card.classList.add('visible');
  document.getElementById('wind-body').innerHTML =
    '<div style="color:var(--text-muted,#6b7280);font-size:13px"><i class="fas fa-circle-notch fa-spin"></i> Obteniendo datos...</div>';

  if (!navigator.geolocation) {
    document.getElementById('wind-body').innerHTML =
      '<div style="color:#ff4757;font-size:12px">Geolocalización no disponible.</div>';
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const { latitude: lat, longitude: lon } = pos.coords;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                  `&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m` +
                  `&wind_speed_unit=kmh&timezone=auto`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const cur  = data.current;

      const speed  = Math.round(cur.wind_speed_10m);
      const gusts  = Math.round(cur.wind_gusts_10m);
      const deg    = cur.wind_direction_10m;

      // Dirección de donde viene el viento
      const compassFrom = degToCompass(deg);
      // El viento te empuja en la dirección opuesta → sal hacia donde viene
      const salDir      = compassFrom;
      const vueltaDir   = degToCompass((deg + 180) % 360);

      const level = speed < 15 ? { txt: 'Suave', color: '#10B981' }
                  : speed < 30 ? { txt: 'Moderado', color: '#F59E0B' }
                  : speed < 50 ? { txt: 'Fuerte', color: '#EF4444' }
                  :              { txt: 'Muy fuerte', color: '#8B5CF6' };

      document.getElementById('wind-body').innerHTML = `
        <div class="wind-speed" style="color:${level.color}">${speed} <span style="font-size:13px;font-weight:500">km/h</span></div>
        <div class="wind-dir">Desde el ${compassFrom} · Ráfagas ${gusts} km/h · <strong style="color:${level.color}">${level.txt}</strong></div>
        <div class="wind-advice">
          <strong>Sal hacia el ${salDir}</strong> (pedalea contra el viento ahora).<br>
          Vuelve desde el ${vueltaDir} con el viento a favor.
        </div>
        <div class="wind-note">
          ${speed < 15 ? '✅ Cualquier ruta es buena hoy.'
          : speed < 30 ? '⚠️ Planifica bien el regreso para no llegar agotado.'
          : speed < 50 ? '🔴 Ruta corta y circular. Evita exposición lateral.'
          : '⛔ Viento extremo. Considera el rodillo hoy.'}
        </div>`;
    } catch(e) {
      document.getElementById('wind-body').innerHTML =
        `<div style="color:#ff4757;font-size:12px">Error al obtener el viento.<br><small>${e.message}</small></div>`;
    }
  }, () => {
    document.getElementById('wind-body').innerHTML =
      '<div style="color:#ff4757;font-size:12px">Activa la ubicación en tu navegador para ver el viento.</div>';
  });
}

function degToCompass(deg) {
  const dirs = ['Norte','Noreste','Este','Sureste','Sur','Suroeste','Oeste','Noroeste'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── Utilidades ───────────────────────────────────────────────────
function formatTime(min) {
  if (!min || isNaN(min)) return '—';
  const h = Math.floor(min / 60), m = min % 60;
  return h ? `${h}h${m > 0 ? ' ' + m + 'min' : ''}` : `${m}min`;
}

function parseTimeMin(str) {
  if (!str || str === '—') return null;
  const h = (str.match(/(\d+)h/)  || [])[1];
  const m = (str.match(/(\d+)min/) || [])[1];
  return ((h ? +h * 60 : 0) + (m ? +m : 0)) || null;
}

function haversineTotal(latLngs) {
  let d = 0, R = 6371;
  for (let i = 1; i < latLngs.length; i++) {
    const [la1, ln1] = latLngs[i-1], [la2, ln2] = latLngs[i];
    const dLa = (la2-la1)*Math.PI/180, dLn = (ln2-ln1)*Math.PI/180;
    const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)**2;
    d += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  return d;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
